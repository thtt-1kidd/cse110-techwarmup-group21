<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Token Roulette | High-Inference Gambling</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>AI Token Roulette</h1>
            <p class="tagline">Where your tokens go to get hallucinated.</p>
        </header>

        <section class="stats-bar">
            <div class="stat-box">
                <span class="label">Available Tokens</span>
                <span id="token-balance" class="value">100</span>
            </div>
            <div class="stat-box">
                <span class="label">Inference Cost (Total)</span>
                <span id="total-burned" class="value">0</span>
            </div>
        </section>

        <main class="slot-machine">
            <div class="reels-container">
                <div class="reel" id="reel-1">💸</div>
                <div class="reel" id="reel-2">💸</div>
                <div class="reel" id="reel-3">💸</div>
            </div>
            
            <div class="controls">
                <button id="spin-btn">RUN INFERENCE (5 Tokens)</button>
                <button id="reset-btn" class="secondary">Burn New Venture Capital</button>
            </div>
        </main>

        <section class="log-container">
            <h3>Inference Logs</h3>
            <div id="event-log" class="log-window">
                <p class="log-entry system">Ready for overhyped predictions...</p>
            </div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
