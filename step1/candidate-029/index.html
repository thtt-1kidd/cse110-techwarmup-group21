<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Token Roulette - The Future is Stochastic</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>AI Token Roulette</h1>
            <p class="tagline">Scale your technical debt with every spin!</p>
        </header>

        <main class="slot-machine">
            <div class="stats-bar">
                <div class="stat">CREDITS: <span id="token-count">100</span></div>
                <div class="stat">COMPUTE BURN: <span id="burn-count">0</span></div>
            </div>

            <div class="reels-container">
                <div class="reel" id="reel-1">🤖</div>
                <div class="reel" id="reel-2">📈</div>
                <div class="reel" id="reel-3">💸</div>
            </div>

            <div class="controls">
                <button id="spin-btn">Run Inference (10 Tokens)</button>
                <button id="reset-btn" class="secondary">Pivot Startup (Reset)</button>
            </div>

            <div class="terminal">
                <div class="terminal-header">Inference Logs</div>
                <div id="status-msg" class="msg-system">Awaiting prompt injection...</div>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 Overhype AI Corp. Results may be hallucinated. No refunds for model collapse.</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
