<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Token Roulette</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>AI Token Roulette™</h1>
            <p class="tagline">Turning GPU heat into shareholder value</p>
        </header>

        <div class="stats-panel">
            <div class="stat">
                <span class="label">Compute Balance:</span>
                <span id="token-balance" class="value">100</span>
                <span class="unit">tokens</span>
            </div>
        </div>

        <main class="slot-machine">
            <div class="reels">
                <div class="reel" id="reel-1">?</div>
                <div class="reel" id="reel-2">?</div>
                <div class="reel" id="reel-3">?</div>
            </div>
            <button id="spin-button">Run Inference (5 tokens)</button>
        </main>

        <section class="log-area">
            <div id="status-log">System initialized. Awaiting parameters...</div>
        </section>

        <footer>
            <details>
                <summary>View Payout Whitepaper</summary>
                <div class="payout-grid">
                    <span>🎰🎰🎰: 100 | 💰💰💰: 200 | 🔮🔮🔮: 75 | 💸💸💸: 50 | 📈📈📈: 30 | 2-Match: 10</span>
                </div>
            </details>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
