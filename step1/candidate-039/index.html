<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TokenBurner AI | High-Latency Slot Machine</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>TokenBurner <span class="version">v4.0-ultra-turbo</span></h1>
            <p class="subtitle">Disrupting your balance with non-deterministic outcomes.</p>
        </header>

        <section class="stats-bar">
            <div class="stat">
                <label>Compute Credits</label>
                <span id="balance">100</span>
            </div>
            <div class="stat">
                <label>Total GPU Burn</label>
                <span id="total-burn">0</span>
            </div>
        </section>

        <main class="slot-machine">
            <div class="reels">
                <div class="reel" id="reel-1">🤖</div>
                <div class="reel" id="reel-2">🤖</div>
                <div class="reel" id="reel-3">🤖</div>
            </div>
            
            <div class="controls">
                <button id="spin-btn">Run Inference (5 tokens)</button>
                <button id="reset-btn" class="secondary">Pivot (Reset)</button>
            </div>
        </main>

        <section class="console">
            <div class="console-header">System Logs</div>
            <div id="status-msg" class="log-entry">Awaiting prompt...</div>
        </section>

        <footer>
            <p>&copy; 2026 Artificial Luck Inc. | "Results are statistically significant-ish."</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
