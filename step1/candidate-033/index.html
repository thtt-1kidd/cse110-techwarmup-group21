<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inference Roulette - The Future of Compute</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="mainframe">
        <header>
            <h1>INFERENCE <span class="highlight">ROULETTE</span></h1>
            <p class="subtitle">Burn your seed funding on the altar of AGI.</p>
        </header>

        <section class="dashboard">
            <div class="stat-card">
                <span class="label">Available Tokens</span>
                <span id="token-balance" class="value">100</span>
            </div>
            <div class="stat-card">
                <span class="label">Compute Burned</span>
                <span id="burn-rate" class="value">0</span>
            </div>
        </section>

        <main class="machine">
            <div class="reels">
                <div class="reel-container">
                    <div class="reel" id="reel-1">🤖</div>
                </div>
                <div class="reel-container">
                    <div class="reel" id="reel-2">🤖</div>
                </div>
                <div class="reel-container">
                    <div class="reel" id="reel-3">🤖</div>
                </div>
            </div>

            <div class="actions">
                <button id="spin-btn">RUN INFERENCE (5 Tokens)</button>
                <button id="reset-btn" class="secondary">Pivot Startup (Reset)</button>
            </div>
        </main>

        <section class="console">
            <div class="console-header">System Output</div>
            <div id="status-msg" class="console-text">Awaiting prompt input...</div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
