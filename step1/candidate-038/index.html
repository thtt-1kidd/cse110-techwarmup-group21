<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inference One | AI Token Roulette</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Inference <span class="highlight">One</span></h1>
            <p class="tagline">Disrupting your balance, one token at a time.</p>
        </header>

        <div class="stats-panel">
            <div class="stat-box">
                <label>Available Tokens</label>
                <div id="balance">100</div>
            </div>
            <div class="stat-box">
                <label>Compute Cost</label>
                <div class="cost">-5</div>
            </div>
        </div>

        <div class="slot-machine">
            <div class="reels">
                <div class="reel" id="reel1">🤖</div>
                <div class="reel" id="reel2">🤖</div>
                <div class="reel" id="reel3">🤖</div>
            </div>
        </div>

        <div class="controls">
            <button id="spin-btn">Run Inference</button>
            <button id="reset-btn" class="secondary">Pivot (Reset)</button>
        </div>

        <div class="console">
            <div class="console-header">System Logs</div>
            <div id="status-msg">Initialization complete. Please deposit tokens to begin training.</div>
        </div>

        <footer>
            <p>Non-deterministic results. Hallucinations expected. No refunds for model collapse.</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
