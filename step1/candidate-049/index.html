<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Token Roulette | Optimized Inference</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>AI Token Roulette</h1>
            <p class="tagline">"Where your tokens go to get hallucinated™"</p>
        </header>

        <main class="slot-machine">
            <div class="stats-bar">
                <div class="stat-item">
                    <span class="label">Balance:</span>
                    <span id="balance">100</span> <span class="unit">tokens</span>
                </div>
                <div class="stat-item">
                    <span class="label">Inference Cost:</span>
                    <span id="cost">5</span> <span class="unit">/spin</span>
                </div>
            </div>

            <div class="reels">
                <div class="reel" id="reel1">🤖</div>
                <div class="reel" id="reel2">🤖</div>
                <div class="reel" id="reel3">🤖</div>
            </div>

            <div class="controls">
                <button id="spin-btn">RUN INFERENCE</button>
            </div>

            <div class="terminal">
                <div class="terminal-header">Model Output Log</div>
                <div id="log" class="log-content">
                    > System initialized. Ready to burn VC capital...
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
