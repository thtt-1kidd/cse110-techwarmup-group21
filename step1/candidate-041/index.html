<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Token Roulette | Disruption Guaranteed</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>AI Token Roulette</h1>
            <p class="tagline">Moving fast and hallucinating things.</p>
        </header>

        <main class="casino-floor">
            <div class="balance-card">
                <span class="label">Available Tokens:</span>
                <span id="token-balance" class="value">100</span>
            </div>

            <div class="slot-machine">
                <div class="reels">
                    <div class="reel" id="reel1">🤖</div>
                    <div class="reel" id="reel2">🤖</div>
                    <div class="reel" id="reel3">🤖</div>
                </div>
                
                <div class="controls">
                    <button id="spin-button">Spin (10 Tokens)</button>
                    <button id="reset-button" class="secondary">Burn More Capital</button>
                </div>
            </div>

            <div class="terminal">
                <div class="terminal-header">Inference Logs</div>
                <div id="log-output" class="log-content">
                    > System initialized.<br>
                    > Awaiting venture capital...
                </div>
            </div>
        </main>

        <footer>
            <details>
                <summary>Pricing & Payouts (Non-Binding)</summary>
                <p>3x 💰: +250 | 3x 🎰: +150 | 3x 📈: +50 | Any 2-match: +10</p>
            </details>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
