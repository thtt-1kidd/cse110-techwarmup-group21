<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Token Roulette | Generative Gambling</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>AI TOKEN ROULETTE</h1>
            <p class="subtitle">State-of-the-art inference. Zero-shot financial loss.</p>
        </header>

        <div class="stats-bar">
            <div class="stat">BALANCE: <span id="token-balance">100</span> TOKENS</div>
            <div class="stat">COST: <span id="spin-cost">5</span> / SPIN</div>
        </div>

        <div class="slot-machine">
            <div class="reel" id="reel-1">🧠</div>
            <div class="reel" id="reel-2">🧠</div>
            <div class="reel" id="reel-3">🧠</div>
        </div>

        <div class="controls">
            <button id="spin-button">RUN INFERENCE</button>
        </div>

        <div class="terminal">
            <div class="terminal-header">SYSTEM LOG</div>
            <div id="log-content" class="terminal-body">
                <div>> System initialized...</div>
                <div>> Waiting for your tokens to be processed...</div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
